# =============================================================================
# AI Pulse – Railway Deployment Configuration
# https://docs.railway.com/reference/config-as-code
# =============================================================================

[build]
builder        = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
# Use root repository context so Dockerfile can find files under backend/
buildContext   = "."

[deploy]
# No startCommand — the Dockerfile CMD uses shell form to expand ${PORT:-8000}.
# Railway runs a Dockerfile startCommand in exec form, which does NOT expand $PORT.
healthcheckPath     = "/health"
healthcheckTimeout  = 30
restartPolicyType   = "ON_FAILURE"
restartPolicyMaxRetries = 3
