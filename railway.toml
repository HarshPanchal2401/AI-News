# =============================================================================
# AI Pulse – Railway Deployment Configuration
# https://docs.railway.com/reference/config-as-code
# =============================================================================

[build]
builder        = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
# Use root repository context so Dockerfile can find files under backend/
buildContext   = "."

[deploy]
# Railway injects $PORT automatically — never hardcode 8000
startCommand        = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info"
healthcheckPath     = "/health"
healthcheckTimeout  = 30
restartPolicyType   = "ON_FAILURE"
restartPolicyMaxRetries = 3
