# =============================================================================
# AI Pulse – Docker Compose (Local Development)
# Note: Database is Supabase cloud — no local DB container needed
# =============================================================================

version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: runtime
    container_name: ai_pulse_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - LOG_LEVEL=debug
    volumes:
      # Hot-reload in dev (mount source code)
      - ./app:/app/app:ro
      - ../frontend:/app/frontend:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai_pulse_network

networks:
  ai_pulse_network:
    driver: bridge
